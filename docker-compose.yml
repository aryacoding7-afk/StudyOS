

services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: studyos-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: studyos
      POSTGRES_PASSWORD: studyos
      POSTGRES_DB: studyos

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: studyos-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:

  postgres_data:

  redis_data: