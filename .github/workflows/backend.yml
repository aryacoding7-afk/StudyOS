name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studyos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Enable pgvector
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d studyos_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/studyos_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/studyos_test
          REDIS_URL: redis://localhost:6379/0

          JWT_SECRET: github-actions-test-secret
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30

          GEMINI_API_KEY: dummy-key

          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
          LLM_MODEL: gemini-2.5-flash
          TOP_K: 5
          TEMPERATURE: 0.2
          MAX_OUTPUT_TOKENS: 2048

        run: |
          pytest